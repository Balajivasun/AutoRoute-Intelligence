<!DOCTYPE html>
<html>
<head>
    <title>AutoRoute Intelligence</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Fleet Management Dashboard</h2>
    <div class="row">
        <div class="col-md-6">
            <h3>Buses</h3>
            <ul class="list-group">
                {% for bus in buses %}
                <li class="list-group-item">{{ bus.bus_number }} - Cap: {{ bus.capacity }}</li>
                {% endfor %}
            </ul>
        </div>
        <div class="col-md-6">
            <button onclick="runOptimizer()" class="btn btn-primary">Run AI Scheduling</button>
            <div id="results" class="mt-3"></div>
        </div>
    </div>

    <script>
        async function runOptimizer() {
            const res = await fetch('/run-optimizer');
            const data = await res.json();
            let html = "<h4>New Schedule:</h4><ul>";
            data.forEach(item => {
                html += `<li>Bus ${item.bus} assigned to ${item.route}</li>`;
            });
            document.getElementById('results').innerHTML = html + "</ul>";
        }
    </script>
</body>
</html>
